name: Digest normativo

on:
  # Esecuzione automatica giornaliera. 05:00 UTC = 07:00 in Italia d'estate,
  # 06:00 d'inverno (GitHub usa UTC e non gestisce l'ora legale).
  schedule:
    - cron: "7 3 * * *"     # 03:07 UTC = 05:07 IT estate / 04:07 inverno
  # Avvio manuale dal pulsante "Run workflow"
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Azzera lo storico e riparti da zero (lascia deselezionato per l'uso normale)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repo
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Raccolta (fase 1)
        run: python collect.py

      - name: Elaborazione - novita' e deduplica (fase 2)
        run: python process.py
        env:
          RESET_STATE: ${{ inputs.reset_state }}

      - name: Sintesi degli atti (fase 3)
        run: python summarize.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Invio email (fase 4)
        run: python email_digest.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}

      - name: Salva lo storico nel repo
        if: always()
        run: |
          git config user.name "digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json || true
          git diff --staged --quiet || git commit -m "Aggiorna storico digest [skip ci]"
          git push || echo "niente da pushare"

      - name: Carica i risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: data/
