name: Digest normativo (raccolta + elaborazione)

# Per ora avvio manuale (pulsante "Run workflow"). Lo scheduling giornaliero
# automatico lo attiviamo nella fase finale, insieme all'email.
on:
  workflow_dispatch:

# Serve per salvare lo storico (state/seen.json) nel repo a fine esecuzione.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repo
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Raccolta (fase 1)
        run: python collect.py

      - name: Elaborazione - novita' e deduplica (fase 2)
        run: python process.py

      - name: Salva lo storico nel repo
        if: always()
        run: |
          git config user.name "digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json || true
          git diff --staged --quiet || git commit -m "Aggiorna storico digest [skip ci]"
          git push || echo "niente da pushare"

      - name: Carica i risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: data/
