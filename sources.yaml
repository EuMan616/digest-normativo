# ============================================================================
#  REGISTRO FONTI - digest normativo regolamentazione finanziaria IT/UE
# ============================================================================
#  Pannello di controllo. Per aggiungere una fonte: copia un blocco dello stesso
#  "type" e cambia i campi. "url" puo' essere stringa o elenco di candidati
#  (provati in ordine). Se un URL e' una pagina (non un feed), il programma
#  cerca da solo il feed dichiarato nell'HTML (auto-rilevamento).
# ============================================================================

sources:

  # ---- UE: autorita' di vigilanza ----------------------------------------- #
  - id: esma
    name: ESMA - European Securities and Markets Authority
    type: rss
    url: https://www.esma.europa.eu/rss.xml                 # CONFERMATO

  - id: eba
    name: EBA - European Banking Authority
    type: rss
    url: https://www.eba.europa.eu/news-press/news/rss.xml  # CONFERMATO

  - id: eiopa
    name: EIOPA - European Insurance and Occupational Pensions Authority
    type: scrape                            # sito senza feed: scraping mirato
    url: https://www.eiopa.europa.eu/media/news_en
    link_pattern: '-\d{4}-\d{2}-\d{2}_en$'  # tiene solo gli articoli (URL con data)

  # ---- Italia: Banca d'Italia (3 sezioni del perimetro) ------------------- #
  - id: bankitalia_vigilanza
    name: Banca d'Italia - Vigilanza sistema bancario e finanziario
    type: rss
    url: https://www.bancaditalia.it/util/index.rss.html?sezione=/compiti/vigilanza&lingua=it   # CONFERMATO

  - id: bankitalia_antiriciclaggio
    name: Banca d'Italia - Supervisione e normativa antiriciclaggio
    type: rss
    url: https://www.bancaditalia.it/util/index.rss.html?sezione=/compiti/supervisione-normativa-antiriciclaggio&lingua=it

  - id: bankitalia_risoluzione
    name: Banca d'Italia - Risoluzione e gestione delle crisi
    type: rss
    url: https://www.bancaditalia.it/util/index.rss.html?sezione=/compiti/risoluzione-gestione-crisi&lingua=it

  # ---- Italia: IVASS ------------------------------------------------------ #
  - id: ivass
    name: IVASS - normativa e provvedimenti
    type: rss
    url:                                   # stesso schema di Banca d'Italia (infra condivisa)
      - https://www.ivass.it/util/index.rss.html?sezione=/normativa&lingua=it
      - https://www.ivass.it/util/index.rss.html?lingua=it   # CONFERMATO (feed generale)

  # ---- Italia: CONSOB (scraping, da affinare) ----------------------------- #
  - id: consob
    name: CONSOB - bollettino, newsletter, consultazioni
    type: scrape
    urls:
      - https://www.consob.it/web/area-pubblica/bollettino
      - https://www.consob.it/web/area-pubblica/newsletter/recenti
      - https://www.consob.it/web/area-pubblica/consultazioni/in-corso
    notes: "Selettori/pattern da affinare guardando i link grezzi del JSON."

  # ---- UE: legislazione (fase 1b) ----------------------------------------- #
  - id: eurlex
    name: EUR-Lex - GUUE serie L + delegati/RTS/ITS (filtrato)
    type: eurlex_anchor
    notes: "Implementazione dedicata in fase 1b."

  # ---- Italia: legislazione primaria (fase 1b) ---------------------------- #
  - id: gazzetta_ufficiale
    name: Gazzetta Ufficiale - Serie Generale
    type: rss
    url: TODO_FEED_URL                     # da trovare in fase 1b

  - id: normattiva
    name: Normattiva - testo consolidato (solo link)
    type: link_target_only
    url: https://www.normattiva.it/

  # ---- Antenna di scoperta (solo titolo+link) ----------------------------- #
  - id: dirittobancario
    name: dirittobancario.it - flash news (discovery)
    type: discovery
    url: https://www.dirittobancario.it/feed/               # CONFERMATO


# ============================================================================
#  EUR-LEX: filtro a doppia rete (usato in fase 1b) - invariato
# ============================================================================
eurlex:
  subject_filter:
    include:
      - credit institutions / financial institutions
      - securities / investment services / financial market
      - insurance / occupational pensions
      - money laundering / financial supervision
      - crypto-assets / digital finance
    exclude:
      - agriculture, fisheries, environment-only (fuori perimetro)

  anchor_acts:
    banche_prudenziale:
      - CRR    - Regulation (EU) No 575/2013
      - CRD    - Directive 2013/36/EU
      - BRRD   - Directive 2014/59/EU
      - SRMR   - Regulation (EU) No 806/2014
      - DGSD   - Directive 2014/49/EU
    mercati:
      - MiFID II      - Directive 2014/65/EU
      - MiFIR         - Regulation (EU) No 600/2014
      - MAR           - Regulation (EU) No 596/2014
      - Short Selling - Regulation (EU) No 236/2012
      - CSDR          - Regulation (EU) No 909/2014
      - EMIR          - Regulation (EU) No 648/2012
      - Prospectus    - Regulation (EU) 2017/1129
      - Listing Act   - Regulation (EU) 2024/2809
      - MMF           - Regulation (EU) 2017/1131
      - BMR           - Regulation (EU) 2016/1011
      - CRA           - Regulation (EC) No 1060/2009
    gestione_risparmio:
      - AIFMD          - Directive 2011/61/EU
      - UCITS          - Directive 2009/65/EC
      - ELTIF          - Regulation (EU) 2015/760
      - Securitisation - Regulation (EU) 2017/2402
      - ECSPR          - Regulation (EU) 2020/1503
    assicurazioni_pensioni:
      - Solvency II - Directive 2009/138/EC
      - IDD         - Directive (EU) 2016/97
      - PEPP        - Regulation (EU) 2019/1238
      - IORP II     - Directive (EU) 2016/2341
    cripto_digitale:
      - MiCAR - Regulation (EU) 2023/1114
      - DORA  - Regulation (EU) 2022/2554
    pagamenti:
      - PSD2 - Directive (EU) 2015/2366
      - EMD  - Directive 2009/110/EC
      - PSD3_PSR - PROPOSTA: tracciare la procedura, non un CELEX finale
    antiriciclaggio:
      - AMLR  - Regulation (EU) 2024/1624
      - AMLD6 - Directive (EU) 2024/1640
      - AMLA  - Regulation (EU) 2024/1620
    finanza_sostenibile:
      - SFDR     - Regulation (EU) 2019/2088
      - Taxonomy - Regulation (EU) 2020/852
