# ============================================================================
#  REGISTRO FONTI - digest normativo regolamentazione finanziaria IT/UE
# ============================================================================
#  "url" puo' essere stringa o elenco (provati in ordine). Se un URL e' una
#  pagina (non un feed), il programma cerca da solo il feed nell'HTML.
#  type: rss | rss_filtered | scrape | discovery | eurlex_anchor | link_target_only
# ============================================================================

sources:

  # ---- UE: autorita' di vigilanza ----------------------------------------- #
  - id: esma
    name: ESMA - European Securities and Markets Authority
    type: rss
    url: https://www.esma.europa.eu/rss.xml

  - id: eba
    name: EBA - European Banking Authority
    type: rss
    url: https://www.eba.europa.eu/news-press/news/rss.xml

  - id: eiopa
    name: EIOPA - European Insurance and Occupational Pensions Authority
    type: scrape
    url: https://www.eiopa.europa.eu/media/news_en
    link_pattern: '-\d{4}-\d{2}-\d{2}_en$'

  - id: ecb_vigilanza
    name: BCE - Vigilanza bancaria europea (pubblicazioni)
    type: rss
    url: https://www.bankingsupervision.europa.eu/rss/pub.html   # CONFERMATO

  - id: ecb_vigilanza_press
    name: BCE - Vigilanza bancaria europea (comunicati)
    type: rss
    url: https://www.bankingsupervision.europa.eu/rss/press.html

  # ---- Italia: associazioni di categoria (soft-law, non normativa vincolante)
  # NB: feed da confermare al primo run (siti WordPress, URL non verificato).
  - id: assosim
    name: Assosim - circolari e risposte a consultazioni
    type: rss
    url:
      - https://www.assosim.it/circolari/feed/
      - https://www.assosim.it/circolari/
      - https://www.assosim.it/feed/

  - id: assogestioni
    name: Assogestioni - comunicati stampa
    type: rss
    url:
      - https://www.assogestioni.it/feed/
      - https://www.assogestioni.it/categoria-articolo/comunicati-stampa

  # ---- Italia: Banca d'Italia (3 sezioni del perimetro) ------------------- #
  - id: bankitalia_vigilanza
    name: Banca d'Italia - Vigilanza sistema bancario e finanziario
    type: rss
    url: https://www.bancaditalia.it/util/index.rss.html?sezione=/compiti/vigilanza&lingua=it

  - id: bankitalia_antiriciclaggio
    name: Banca d'Italia - Supervisione e normativa antiriciclaggio
    type: rss
    url: https://www.bancaditalia.it/util/index.rss.html?sezione=/compiti/supervisione-normativa-antiriciclaggio&lingua=it

  - id: bankitalia_risoluzione
    name: Banca d'Italia - Risoluzione e gestione delle crisi
    type: rss
    url: https://www.bancaditalia.it/util/index.rss.html?sezione=/compiti/risoluzione-gestione-crisi&lingua=it

  # ---- Italia: IVASS ------------------------------------------------------ #
  - id: ivass
    name: IVASS - normativa e provvedimenti
    type: rss
    url:
      - https://www.ivass.it/util/index.rss.html?sezione=/normativa&lingua=it
      - https://www.ivass.it/util/index.rss.html?lingua=it

  # ---- Italia: CONSOB (edizioni del Bollettino) --------------------------- #
  - id: consob
    name: CONSOB - Bollettino (edizioni quindicinali)
    type: scrape
    url: https://www.consob.it/web/area-pubblica/bollettino
    link_pattern: '/bollettino/periodo\d+'   # solo le edizioni; data nel titolo
    notes: >
      Segnale "nuovo bollettino + data". Le pagine consultazioni/newsletter sono
      rese via JavaScript (non scrapeabili senza browser headless): per gli atti
      CONSOB di portata generale ci si appoggia a Gazzetta Ufficiale e dirittobancario.

  # ---- Italia: Gazzetta Ufficiale - Serie Generale (filtrata) ------------- #
  - id: gazzetta_ufficiale
    name: Gazzetta Ufficiale - Serie Generale (filtro materia finanziaria)
    type: rss_filtered
    url: https://www.gazzettaufficiale.it/rss/SG    # CONFERMATO (firehose, va filtrato)
    include_keywords:                               # prima passata, da affinare sul reale
      - banca d'italia
      - banche
      - bancari
      - testo unico bancario
      - tub
      - testo unico della finanza
      - tuf
      - consob
      - ivass
      - covip
      - intermediari finanziari
      - intermediazione finanziaria
      - mercati finanziari
      - strumenti finanziari
      - valori mobiliari
      - assicurativ
      - assicurazion
      - riassicur
      - antiriciclaggio
      - riciclaggio
      - cripto
      - micar
      - servizi di pagamento
      - moneta elettronica
      - istituti di pagamento
      - sgr
      - sicav
      - sicaf
      - oicr
      - fondi comuni
      - cartolarizzazion
      - obbligazioni bancarie
      - solvency
      - fintech

  # ---- UE: legislazione (EUR-Lex) ----------------------------------------- #
  - id: eurlex
    name: EUR-Lex - ricerca salvata reg. finanziaria (RSS)
    type: rss_filtered
    url: "https://eur-lex.europa.eu/IT/display-feed.rss?myRssId=zqe4%2F5Mg5EIwdPmm3XxVPsOJ%2FFgxKfaaQpZ0BstzLr8%3D"
    exclude_keywords:                  # rumore non regolatorio (concorrenza/aiuti di Stato)
      - notifica preventiva di concentrazione
      - non opposizione a un'operazione di concentrazione
      - "(caso m."
      - aiuto di stato
      - aiuti di stato
  # ---- Italia: Normattiva (solo link) ------------------------------------- #
  - id: normattiva
    name: Normattiva - testo consolidato (solo link)
    type: link_target_only
    url: https://www.normattiva.it/

  # ---- Antenna di scoperta (solo titolo+link) ----------------------------- #
  - id: dirittobancario
    name: dirittobancario.it - flash news (discovery)
    type: discovery
    url: https://www.dirittobancario.it/feed/


# ============================================================================
#  EUR-LEX: atti-perimetro per costruire la ricerca salvata (riferimento)
# ============================================================================
eurlex_anchor_acts:
  banche_prudenziale: [CRR 575/2013, CRD 2013/36, BRRD 2014/59, SRMR 806/2014, DGSD 2014/49]
  mercati: [MiFID II 2014/65, MiFIR 600/2014, MAR 596/2014, Short Selling 236/2012,
            CSDR 909/2014, EMIR 648/2012, Prospectus 2017/1129, Listing Act 2024/2809,
            MMF 2017/1131, BMR 2016/1011, CRA 1060/2009]
  gestione_risparmio: [AIFMD 2011/61, UCITS 2009/65, ELTIF 2015/760,
                       Securitisation 2017/2402, ECSPR 2020/1503]
  assicurazioni_pensioni: [Solvency II 2009/138, IDD 2016/97, PEPP 2019/1238, IORP II 2016/2341]
  cripto_digitale: [MiCAR 2023/1114, DORA 2022/2554]
  pagamenti: [PSD2 2015/2366, EMD 2009/110, "PSD3/PSR (proposta)"]
  antiriciclaggio: [AMLR 2024/1624, AMLD6 2024/1640, AMLA 2024/1620]
  finanza_sostenibile: [SFDR 2019/2088, Taxonomy 2020/852]
